<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Sapien Gastro | Dashboard Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: #121212;
            --text-color: #e0e0e0;
            --accent-pink: #ff6bda;
            --accent-gold: #f3cfb0;
            --whatsapp-green: #25D366;
            --sent-red: #ff3333;
            --shadow: 0 8px 32px rgba(255, 107, 218, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* --- Header & Layout --- */
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 900px; }
        .logo { max-width: 140px; filter: drop-shadow(0 0 8px var(--accent-pink)); margin-bottom: 5px; }
        h1 { color: var(--accent-gold); font-size: 1.4rem; margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; }

        .upload-section {
            background: #161616; padding: 25px; border-radius: 15px; border: 1px dashed var(--accent-pink);
            text-align: center; width: 95%; max-width: 500px; box-shadow: var(--shadow);
        }

        /* --- Status Bar --- */
        .status-bar {
            width: 100%; max-width: 900px; display: none; flex-direction: column;
            background: #1a1a1a; padding: 15px; border-radius: 12px;
            margin-bottom: 20px; border: 1px solid #333; gap: 10px;
        }
        .status-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .progress-container { width: 100%; background: #000; height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-pink); width: 0%; transition: width 0.5s ease; }

        /* --- Grid de Tarjetas --- */
        #container {
            width: 100%; max-width: 1000px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; padding-bottom: 50px;
        }

        .card {
            background-color: var(--card-bg); border-radius: 16px; padding: 18px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card.is-sent { opacity: 0.5; border-color: transparent; }

        .business-info { margin-bottom: 15px; }
        .business-name { color: var(--accent-gold); font-size: 1.1rem; font-weight: 800; line-height: 1.2; }
        .business-meta { color: #888; font-size: 0.85rem; margin-top: 4px; }

        .btn-copy {
            background: rgba(255, 107, 218, 0.08); color: var(--accent-pink);
            border: 1px solid var(--accent-pink); padding: 12px; border-radius: 10px;
            cursor: pointer; width: 100%; font-weight: 600; margin-bottom: 10px; font-size: 0.9rem;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-green); color: white; text-decoration: none;
            padding: 14px; border-radius: 10px; text-align: center; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .btn-whatsapp.sent-mode { background-color: var(--sent-red); pointer-events: none; }

        /* --- Modal Juego --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center;
            align-items: center; z-index: 9999; padding: 10px;
        }
        .game-container {
            background: #000; padding: 15px; border-radius: 20px;
            border: 2px solid var(--accent-pink); text-align: center;
            width: 100%; max-width: 350px;
        }
        #timer-display { color: #fff; font-size: 2rem; font-weight: bold; margin: 10px 0; font-family: monospace; }
        
        canvas { 
            background: #111; border: 1px solid #444; 
            max-width: 100%; height: auto; 
        }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        .ctrl-btn { background: #222; color: white; border: none; padding: 15px 5px; border-radius: 8px; font-size: 1.2rem; }

        .btn-next {
            background: #333; color: #666; border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; cursor: not-allowed; width: 100%; margin-top: 15px;
            text-transform: uppercase;
        }
        .btn-next.ready { background: var(--accent-pink); color: #000; cursor: pointer; box-shadow: 0 0 15px var(--accent-pink); }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            #container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="Imagenes/Logo-Red-Sapien.webp" alt="Logo Red Sapien" class="logo">
        <h1>Sistema Masivo Jacqueline</h1>
    </div>

    <div class="upload-section" id="upload-box">
        <p>Carga el archivo con los registros (Excel/CSV)</p>
        <input type="file" id="file-input" accept=".csv, .xlsx, .xls" style="color: white;">
    </div>

    <div class="status-bar" id="status-bar">
        <div class="status-top">
            <b id="batch-text" style="color: var(--accent-gold);">Lote 1</b>
            <span id="progress-text">0 / 0</span>
            <button onclick="resetSystem()" style="background:none; border:none; color:#555; cursor:pointer; font-size: 0.7rem;">BORRAR TODO</button>
        </div>
        <div class="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="container"></div>

    <div class="modal-overlay" id="game-modal">
        <div class="game-container">
            <div id="game-title" style="color:var(--accent-pink); font-size: 0.9rem; margin-bottom: 5px;">ESPERA DE SEGURIDAD</div>
            <div id="timer-display">01:00</div>
            
            <canvas id="tetris" width="200" height="380"></canvas>
            
            <div class="controls">
                <button class="ctrl-btn" onmousedown="playerMove(-1)">◀️</button>
                <button class="ctrl-btn" onmousedown="playerRotate()">🔄</button>
                <button class="ctrl-btn" onmousedown="playerMove(1)">▶️</button>
                <button class="ctrl-btn" onmousedown="playerDrop()">🔽</button>
            </div>

            <button class="btn-next" id="btn-continue" disabled>Bloqueado</button>
        </div>
    </div>

    <script>
        let globalData = [];
        let currentIndex = 0;
        let sentStatus = {};
        const BATCH_SIZE = 30;

        // Cargar datos guardados
        window.onload = () => {
            const savedData = localStorage.getItem('js_data');
            if(savedData) {
                globalData = JSON.parse(savedData);
                sentStatus = JSON.parse(localStorage.getItem('js_sent')) || {};
                currentIndex = parseInt(localStorage.getItem('js_idx')) || 0;
                showDashboard();
            }
        };

        function resetSystem() {
            if(confirm("¿Segura? Se perderán todos los 223+ registros y el progreso.")) {
                localStorage.clear();
                location.reload();
            }
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval: ""});
                
                globalData = json.map(r => ({
                    Phone: (r.Phone || r.phone || r.Tel || "").toString().replace(/\D/g,''),
                    Name: (r.Name || r.name || r.Nombre || "Negocio").toString(),
                    City: (r.City || r.city || r.Ciudad || "").toString(),
                    Greeting: (r.Greeting || r.Saludo || "Hola").toString()
                })).filter(r => r.Phone.length > 5);

                localStorage.setItem('js_data', JSON.stringify(globalData));
                showDashboard();
            };
            reader.readAsArrayBuffer(file);
        });

        function showDashboard() {
            document.getElementById('upload-box').style.display = 'none';
            document.getElementById('status-bar').style.display = 'flex';
            renderCurrentBatch();
        }

        function renderCurrentBatch() {
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            const start = currentIndex;
            const end = Math.min(start + BATCH_SIZE, globalData.length);
            const batch = globalData.slice(start, end);
            
            batch.forEach((row, i) => {
                const globalIdx = start + i;
                const id = `m_${globalIdx}`;
                const isSent = sentStatus[id];

                const card = document.createElement('div');
                card.className = `card ${isSent ? 'is-sent' : ''}`;
                
                const msg = `${row.Greeting}! Revisando su marca en ${row.City}... recuperen su 30% de comisiones aquí: https://restaurantes.redsapien.com`;
                
                card.innerHTML = `
                    <div class="business-info">
                        <div class="business-name">${row.Name}</div>
                        <div class="business-meta">${row.City} • ${row.Phone}</div>
                    </div>
                    <button class="btn-copy" onclick="copyText('Para el equipo de ${row.Name}', this)">📋 Copiar Pie</button>
                    <a href="https://wa.me/${row.Phone}?text=${encodeURIComponent(msg)}" 
                       target="_blank" class="btn-whatsapp ${isSent ? 'sent-mode' : ''}" 
                       onclick="processSend('${id}')">${isSent ? '✔️ ENVIADO' : 'Enviar WhatsApp'}</a>
                `;
                container.appendChild(card);
            });

            // Actualizar Stats
            const totalSent = Object.keys(sentStatus).length;
            document.getElementById('batch-text').innerText = `Lote ${Math.floor(currentIndex/BATCH_SIZE)+1} de ${Math.ceil(globalData.length/BATCH_SIZE)}`;
            document.getElementById('progress-text').innerText = `${totalSent} / ${globalData.length}`;
            document.getElementById('progress-fill').style.width = `${(totalSent / globalData.length) * 100}%`;
        }

        function processSend(id) {
            sentStatus[id] = true;
            localStorage.setItem('js_sent', JSON.stringify(sentStatus));
            
            // Lógica de Tiempos
            const currentBatchEnd = Math.min(currentIndex + BATCH_SIZE, globalData.length);
            let batchSentCount = 0;
            for(let i=currentIndex; i < currentBatchEnd; i++) {
                if(sentStatus[`m_${i}`]) batchSentCount++;
            }

            const isBatchDone = (batchSentCount >= (currentBatchEnd - currentIndex));
            const waitTime = isBatchDone ? 360 : 60; // 6 mins o 1 min
            
            setTimeout(() => {
                showGame(waitTime, isBatchDone);
            }, 1000);
        }

        function copyText(t, b) {
            navigator.clipboard.writeText(t);
            b.innerText = "✅ COPIADO";
            setTimeout(() => b.innerText = "📋 Copiar Pie", 1000);
        }

        // --- TETRIS & TIMER ---
        let gameActive = false;
        let gameClock;
        const cvs = document.getElementById('tetris');
        const ctx = cvs.getContext('2d');
        ctx.scale(20, 20);

        function showGame(seconds, nextBatch) {
            document.getElementById('game-modal').style.display = 'flex';
            document.getElementById('game-title').innerText = nextBatch ? "DESCANSO DE LOTE (6 MIN)" : "PAUSA ANTI-BLOQUEO (1 MIN)";
            
            const btn = document.getElementById('btn-continue');
            const display = document.getElementById('timer-display');
            btn.disabled = true;
            btn.classList.remove('ready');
            btn.innerText = "JUEGA UN POCO...";

            let timeLeft = seconds;
            gameActive = true;
            resetPlayer();
            runGame();

            if(gameClock) clearInterval(gameClock);
            gameClock = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60).toString().padStart(2,'0');
                let s = (timeLeft%60).toString().padStart(2,'0');
                display.innerText = `${m}:${s}`;

                if(timeLeft <= 0) {
                    clearInterval(gameClock);
                    gameActive = false;
                    btn.disabled = false;
                    btn.classList.add('ready');
                    btn.innerText = "CONTINUAR ENVÍO 🚀";
                    btn.onclick = () => {
                        document.getElementById('game-modal').style.display = 'none';
                        if(nextBatch) {
                            currentIndex += BATCH_SIZE;
                            localStorage.setItem('js_idx', currentIndex);
                        }
                        renderCurrentBatch();
                        window.scrollTo(0,0);
                    };
                }
            }, 1000);
        }

        // Lógica Simple Tetris
        const arena = Array.from({length: 19}, () => new Array(10).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null };

        function createPiece(t) {
            if (t === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            if (t === 'O') return [[1, 1], [1, 1]];
            if (t === 'L') return [[0, 0, 1], [1, 1, 1], [0, 0, 0]];
            if (t === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            return [[1, 1, 0], [0, 1, 1], [0, 0, 0]];
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(m, o) {
            m.forEach((row, y) => {
                row.forEach((v, x) => {
                    if (v !== 0) {
                        ctx.fillStyle = '#ff6bda';
                        ctx.fillRect(x + o.x, y + o.y, 1, 1);
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                resetPlayer();
                sweep();
            }
            dropCount = 0;
        }

        function playerMove(d) {
            player.pos.x += d;
            if (collide(arena, player)) player.pos.x -= d;
        }

        function playerRotate() {
            const pos = player.pos.x;
            let offset = 1;
            const m = player.matrix;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
            }
            m.forEach(row => row.reverse());
            if (collide(arena, player)) { player.pos.x = pos; }
        }

        function collide(a, p) {
            const [m, o] = [p.matrix, p.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(a, p) {
            p.matrix.forEach((row, y) => {
                row.forEach((v, x) => {
                    if (v !== 0) a[y + p.pos.y][x + p.pos.x] = v;
                });
            });
        }

        function sweep() {
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                arena.splice(y, 1);
                arena.unshift(new Array(10).fill(0));
            }
        }

        function resetPlayer() {
            const pcs = 'TOLIZS';
            player.matrix = createPiece(pcs[pcs.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = 4;
            if (collide(arena, player)) arena.forEach(r => r.fill(0));
        }

        let dropCount = 0;
        let lastTime = 0;
        function runGame(t = 0) {
            if(!gameActive) return;
            const delta = t - lastTime;
            lastTime = t;
            dropCount += delta;
            if (dropCount > 1000) playerDrop();
            draw();
            requestAnimationFrame(runGame);
        }
    </script>
</body>
</html>

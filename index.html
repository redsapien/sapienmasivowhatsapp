<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Sapien Gastro | Dashboard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: #121212;
            --text-color: #e0e0e0;
            --accent-pink: #ff6bda;
            --accent-gold: #f3cfb0;
            --whatsapp-green: #25D366;
            --sent-red: #ff3333;
            --shadow: 0 8px 32px rgba(255, 107, 218, 0.2);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 900px; }
        .logo { max-width: 140px; filter: drop-shadow(0 0 8px var(--accent-pink)); margin-bottom: 5px; }
        h1 { color: var(--accent-gold); font-size: 1.4rem; margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .upload-section {
            background: #161616; padding: 25px; border-radius: 15px; border: 1px dashed var(--accent-pink);
            text-align: center; width: 95%; max-width: 500px; box-shadow: var(--shadow);
        }

        .status-bar {
            width: 100%; max-width: 900px; display: none; flex-direction: column;
            background: #1a1a1a; padding: 15px; border-radius: 12px;
            margin-bottom: 20px; border: 1px solid #333; gap: 10px;
        }
        .status-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        /* Estilos Navegación de Lotes */
        .nav-controls { display: flex; align-items: center; gap: 10px; }
        .btn-nav { 
            background: #333; color: white; border: 1px solid #444; 
            padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-container { width: 100%; background: #000; height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-pink); width: 0%; transition: width 0.5s ease; }
        
        #container {
            width: 100%; max-width: 1000px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; padding-bottom: 50px;
        }
        .card {
            background-color: var(--card-bg); border-radius: 16px; padding: 18px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card.is-sent { opacity: 0.4; border-color: transparent; }
        .business-info { margin-bottom: 15px; }
        .business-name { color: var(--accent-gold); font-size: 1.1rem; font-weight: 800; line-height: 1.2; }
        .business-meta { color: #888; font-size: 0.85rem; margin-top: 4px; }
        
        .btn-copy {
            background: rgba(255, 107, 218, 0.08); color: var(--accent-pink);
            border: 1px solid var(--accent-pink); padding: 12px; border-radius: 10px;
            cursor: pointer; width: 100%; font-weight: 600; margin-bottom: 10px; font-size: 0.9rem;
        }
        .btn-whatsapp {
            background-color: var(--whatsapp-green); color: white; border: none;
            padding: 14px; border-radius: 10px; text-align: center; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; width: 100%; font-size: 1rem;
        }
        .btn-whatsapp.sent-mode { background-color: var(--sent-red); cursor: default; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center;
            align-items: center; z-index: 9999; padding: 10px;
        }
        .game-container {
            background: #000; padding: 15px; border-radius: 20px;
            border: 2px solid var(--accent-pink); text-align: center;
            width: 100%; max-width: 350px;
        }
        #timer-display { color: #fff; font-size: 2rem; font-weight: bold; margin: 10px 0; font-family: monospace; }
        canvas { background: #111; border: 1px solid #444; max-width: 100%; height: auto; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        .ctrl-btn { background: #222; color: white; border: none; padding: 15px 5px; border-radius: 8px; font-size: 1.2rem; }
        .btn-next {
            background: #333; color: #666; border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; cursor: not-allowed; width: 100%; margin-top: 15px;
            text-transform: uppercase;
        }
        .btn-next.ready { background: var(--accent-pink); color: #000; cursor: pointer; box-shadow: 0 0 15px var(--accent-pink); }
    </style>
</head>
<body>
    <div class="header">
        <img src="Imagenes/Logo-Red-Sapien.webp" alt="Logo" class="logo">
        <h1>Sistema Masivo Jacqueline</h1>
    </div>

    <div class="upload-section" id="upload-box">
        <p>Carga el archivo con los registros (Excel/CSV)</p>
        <input type="file" id="file-input" accept=".csv, .xlsx, .xls" style="color: white;">
    </div>

    <div class="status-bar" id="status-bar">
        <div class="status-top">
            <div class="nav-controls">
                <button class="btn-nav" id="btn-prev" onclick="changeBatch(-1)">◀</button>
                <b id="batch-text" style="color: var(--accent-gold);">Lote 1</b>
                <button class="btn-nav" id="btn-next-batch" onclick="changeBatch(1)">▶</button>
            </div>
            <span id="progress-text">0 / 0</span>
            <button onclick="resetSystem()" style="background:none; border:none; color:#555; cursor:pointer; font-size: 0.7rem;">BORRAR TODO</button>
        </div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="container"></div>

    <div class="modal-overlay" id="game-modal">
        <div class="game-container">
            <div id="game-title" style="color:var(--accent-pink); font-size: 0.9rem; margin-bottom: 5px;">PAUSA DE SEGURIDAD</div>
            <div id="timer-display">01:00</div>
            <canvas id="tetris" width="200" height="380"></canvas>
            <div class="controls">
                <button class="ctrl-btn" onclick="playerMove(-1)">◀️</button>
                <button class="ctrl-btn" onclick="playerRotate()">🔄</button>
                <button class="ctrl-btn" onclick="playerMove(1)">▶️</button>
                <button class="ctrl-btn" onclick="playerDrop()">🔽</button>
            </div>
            <button class="btn-next" id="btn-continue" disabled>Esperando...</button>
        </div>
    </div>

    <script>
        let globalData = [];
        let currentIndex = 0;
        let sentStatus = {};
        const BATCH_SIZE = 30;

        let arena = Array.from({length: 19}, () => new Array(10).fill(0));
        let player = { pos: {x: 4, y: 0}, matrix: null };
        let gameActive = false;
        const cvs = document.getElementById('tetris');
        const ctx = cvs.getContext('2d');
        ctx.scale(20, 20);

        window.onload = () => {
            if(localStorage.getItem('js_data')) {
                globalData = JSON.parse(localStorage.getItem('js_data'));
                sentStatus = JSON.parse(localStorage.getItem('js_sent')) || {};
                currentIndex = parseInt(localStorage.getItem('js_idx')) || 0;
                if(localStorage.getItem('js_arena')) arena = JSON.parse(localStorage.getItem('js_arena'));
                showDashboard();
            }
        };

        function resetSystem() {
            if(confirm("¿Segura? Se borrará todo el progreso.")) {
                localStorage.clear();
                location.reload();
            }
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval: ""});
                globalData = json.map(r => ({
                    Phone: (r.Phone || r.phone || r.Tel || "").toString().replace(/\D/g,''),
                    Name: (r.Name || r.name || r.Nombre || "Negocio").toString(),
                    City: (r.City || r.city || r.Ciudad || "").toString(),
                    Greeting: (r.Greeting || r.Saludo || "Hola").toString()
                })).filter(r => r.Phone.length > 5);
                localStorage.setItem('js_data', JSON.stringify(globalData));
                showDashboard();
            };
            reader.readAsArrayBuffer(file);
        });

        function showDashboard() {
            document.getElementById('upload-box').style.display = 'none';
            document.getElementById('status-bar').style.display = 'flex';
            renderCurrentBatch();
        }

        function changeBatch(dir) {
            const newIndex = currentIndex + (dir * BATCH_SIZE);
            if (newIndex >= 0 && newIndex < globalData.length) {
                currentIndex = newIndex;
                localStorage.setItem('js_idx', currentIndex);
                renderCurrentBatch();
                window.scrollTo(0, 0);
            }
        }

        function renderCurrentBatch() {
            const container = document.getElementById('container');
            container.innerHTML = '';
            const start = currentIndex;
            const end = Math.min(start + BATCH_SIZE, globalData.length);
            const batch = globalData.slice(start, end);

            batch.forEach((row, i) => {
                const globalIdx = start + i;
                const id = `m_${globalIdx}`;
                const isSent = sentStatus[id];
                const card = document.createElement('div');
                card.className = `card ${isSent ? 'is-sent' : ''}`;
                
                card.innerHTML = `
                    <div class="business-info">
                        <div class="business-name">${row.Name}</div>
                        <div class="business-meta">${row.City} • ${row.Phone}</div>
                    </div>
                    <button class="btn-copy" onclick="handleCopy(${globalIdx}, this)">📋 Copiar Pie de Video</button>
                    <button class="btn-whatsapp ${isSent ? 'sent-mode' : ''}" 
                            onclick="handleAction(${globalIdx})">
                        ${isSent ? '✔️ ENVIADO' : 'Enviar WhatsApp'}
                    </button>
                `;
                container.appendChild(card);
            });
            updateStats();
        }

        function updateStats() {
            const totalSent = Object.keys(sentStatus).length;
            const totalBatches = Math.ceil(globalData.length / BATCH_SIZE);
            const currentBatchNum = Math.floor(currentIndex / BATCH_SIZE) + 1;
            
            document.getElementById('batch-text').innerText = `Lote ${currentBatchNum} de ${totalBatches}`;
            document.getElementById('progress-text').innerText = `${totalSent} / ${globalData.length}`;
            document.getElementById('progress-fill').style.width = `${(totalSent / globalData.length) * 100}%`;
            
            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            document.getElementById('btn-next-batch').disabled = (currentIndex + BATCH_SIZE >= globalData.length);
        }

        function handleCopy(idx, btn) {
            const row = globalData[idx];
            const text = `Consulta para el equipo de ${row.Name}`;
            navigator.clipboard.writeText(text);
            const old = btn.innerText; btn.innerText = "✅ COPIADO";
            setTimeout(() => btn.innerText = old, 1500);
        }

        function handleAction(idx) {
            const row = globalData[idx];
            const id = `m_${idx}`;
            if(sentStatus[id]) return;

            const msg = `${row.Greeting} les escribo porque revisando su marca en ${row.City}... hoy se les está yendo mucha plata en comisiones de Rappi y apps de delivery 🧐\n\nMiren cómo recuperar ese 30% de ganancia real aquí:\n👇\nhttps://restaurantes.redsapien.com`;
            
            // Abrir primero para evitar bloqueo de pop-up
            window.open(`https://wa.me/${row.Phone}?text=${encodeURIComponent(msg)}`, '_blank');

            sentStatus[id] = true;
            localStorage.setItem('js_sent', JSON.stringify(sentStatus));
            
            setTimeout(() => {
                const end = Math.min(currentIndex + BATCH_SIZE, globalData.length);
                let count = 0;
                for(let i=currentIndex; i<end; i++) if(sentStatus[`m_${i}`]) count++;
                const isBatchDone = (count >= (end - currentIndex));
                showGame(isBatchDone ? 360 : 60, isBatchDone);
            }, 1000);
        }

        function showGame(sec, isNext) {
            document.getElementById('game-modal').style.display = 'flex';
            document.getElementById('game-title').innerText = isNext ? "DESCANSO LOTE (6 MIN)" : "ESPERA ANTI-BLOQUEO (1 MIN)";
            const btn = document.getElementById('btn-continue');
            const timer = document.getElementById('timer-display');
            btn.disabled = true; btn.classList.remove('ready');
            btn.innerText = "Esperando...";
            
            let left = sec;
            gameActive = true; resetPlayer(); runGame();
            
            const clock = setInterval(() => {
                left--;
                let m = Math.floor(left/60).toString().padStart(2,'0');
                let s = (left%60).toString().padStart(2,'0');
                timer.innerText = `${m}:${s}`;
                if(left <= 0) {
                    clearInterval(clock); gameActive = false;
                    btn.disabled = false; btn.classList.add('ready');
                    btn.innerText = "CONTINUAR ENVÍOS 🚀";
                    btn.onclick = () => {
                        document.getElementById('game-modal').style.display = 'none';
                        if(isNext) { currentIndex += BATCH_SIZE; localStorage.setItem('js_idx', currentIndex); }
                        renderCurrentBatch();
                    };
                }
            }, 1000);
        }

        function createPiece(t) {
            if (t === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (t === 'L') return [[0, 0, 1], [1, 1, 1], [0, 0, 0]];
            if (t === 'O') return [[1, 1], [1, 1]];
            if (t === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            return [[1, 1, 0], [0, 1, 1], [0, 0, 0]];
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(m, o) {
            m.forEach((row, y) => { row.forEach((v, x) => {
                if (v !== 0) { ctx.fillStyle = '#ff6bda'; ctx.fillRect(x + o.x, y + o.y, 1, 1); }
            });});
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) { player.pos.y--; merge(arena, player); resetPlayer(); sweep(); }
            dropCount = 0;
            localStorage.setItem('js_arena', JSON.stringify(arena));
        }

        function playerMove(d) { player.pos.x += d; if (collide(arena, player)) player.pos.x -= d; }

        function playerRotate() {
            const m = player.matrix;
            for (let y = 0; y < m.length; ++y) { for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]]; }
            m.forEach(row => row.reverse());
            if (collide(arena, player)) m.forEach(row => row.reverse()); 
        }

        function collide(a, p) {
            const [m, o] = [p.matrix, p.pos];
            for (let y = 0; y < m.length; ++y) { for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true;
            }}
            return false;
        }

        function merge(a, p) {
            p.matrix.forEach((row, y) => { row.forEach((v, x) => {
                if (v !== 0) a[y + p.pos.y][x + p.pos.x] = v;
            });});
        }

        function sweep() {
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
                arena.splice(y, 1); arena.unshift(new Array(10).fill(0));
            }
        }

        function resetPlayer() {
            const pcs = 'ILOTS';
            player.matrix = createPiece(pcs[pcs.length * Math.random() | 0]);
            player.pos.y = 0; player.pos.x = 4;
            if (collide(arena, player)) arena.forEach(r => r.fill(0));
        }

        let dropCount = 0; let lastTime = 0;
        function runGame(t = 0) {
            if(!gameActive) return;
            const delta = t - lastTime; lastTime = t; dropCount += delta;
            if (dropCount > 1000) playerDrop();
            draw(); requestAnimationFrame(runGame);
        }
    </script>
</body>
</html>
